services:
  - type: web
    name: ikomek-backend
    runtime: docker
    plan: free
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: DB_NAME
        value: ikomek_db
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
